name: Auto-generate Game Pages

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Install Dependencies
      run: npm install adm-zip node-fetch @octokit/rest
    - name: Run Auto.js
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: node auto.js
    - name: Commit and Push Generated Pages
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add games-pages/ index.html
        git commit -m "Auto-generate game pages from release"
        git push
