<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Homebrew Games</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <h1>Homebrew Games</h1>
        <input type="text" id="searchBar" placeholder="Search by title or console">
    </header>

    <!-- Grid of top 3 trending -->
    <section id="trendingGrid">
        <h2>Trending Games</h2>
        <div class="grid-container">
            <!-- Dummy Game -->
            <div class="grid-card">
                <a href="game-pages/dummy-game.html">
                    <img src="assets/dummy-cover.jpg" alt="Dummy Game Cover">
                    <div class="grid-info">
                        <h3>Dummy Game</h3>
                        <p>Console: NES</p>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <!-- Table of all games -->
    <section id="allGamesTable">
        <h2>All Games</h2>
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Console</th>
                    <th>Developer</th>
                    <th>Year</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><a href="game-pages/dummy-game.html">Dummy Game</a></td>
                    <td>NES</td>
                    <td>Dummy Dev</td>
                    <td>1985</td>
                </tr>
            </tbody>
        </table>
    </section>

    <script src="assets/scripts.js"></script>
</body>
</html>
