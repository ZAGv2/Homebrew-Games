<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homebrew Games - ZAG Archive</title>
<style>
body { margin:0; font-family:'Segoe UI', sans-serif; background:#f0f2f5; color:#222; }

/* ================= HEADER ================= */
header { background:#fff; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); position:sticky; top:0; z-index:100; flex-wrap:wrap; }
.site-title { font-weight:700; font-size:20px; color:#1e90ff; text-transform:uppercase; }
nav { display:flex; align-items:center; flex-wrap:wrap; }
nav a { margin-left:20px; text-decoration:none; color:#333; font-weight:600; transition:0.2s; }
nav a:hover { color:#1e90ff; }
.dropdown { position:relative; }
.dropbtn { margin-left:20px; font-weight:600; background:none; border:none; cursor:pointer; color:#333; font-size:16px; }
.dropdown-content { display:none; position:absolute; background:#fff; min-width:200px; box-shadow:0 4px 8px rgba(0,0,0,0.1); border-radius:6px; margin-top:8px; overflow:hidden; }
.dropdown-content a { display:block; padding:10px 15px; text-decoration:none; color:#333; }
.dropdown-content a:hover { background:#f0f8ff; color:#1e90ff; }
.dropdown:hover .dropdown-content { display:block; }

/* ================= SEARCH ================= */
.search-bar { max-width:350px; margin:30px auto; display:flex; }
.search-bar input { flex:1; padding:10px 15px; border-radius:8px 0 0 8px; border:1px solid #ccc; font-size:16px; }
.search-bar button { padding:10px 20px; border:none; border-radius:0 8px 8px 0; background:#1e90ff; color:#fff; cursor:pointer; }

/* ================= GRID / TRENDING ================= */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; padding:20px 50px; }
.card { background:#fff; padding:15px; border-radius:12px; text-align:center; box-shadow:0 6px 12px rgba(0,0,0,0.08); cursor:pointer; transition: transform 0.3s, box-shadow 0.3s; }
.card:hover { transform:translateY(-6px); box-shadow:0 12px 18px rgba(0,0,0,0.12); }
.card img { width:100%; border-radius:10px; margin-bottom:10px; }
.card h3 { font-size:18px; margin-bottom:6px; color:#1e90ff; }
.card p { font-size:14px; color:#555; }

/* ================= TABLE ================= */
.game-table { width:90%; margin:20px auto 50px; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 6px 12px rgba(0,0,0,0.08); }
.game-table th, .game-table td { padding:12px 15px; text-align:left; border-bottom:1px solid #ddd; font-size:14px; }
.game-table th { background:#f7f7f7; color:#1e90ff; }
.game-table tr:hover { background:#f0f8ff; cursor:pointer; }

/* ================= PAGINATION ================= */
.pagination { display:flex; justify-content:center; gap:10px; margin-bottom:50px; }
.pagination button { padding:8px 12px; border:none; background:#1e90ff; color:#fff; border-radius:6px; cursor:pointer; }
.pagination button.disabled { background:#ccc; cursor:not-allowed; }

/* ================= FOOTER ================= */
footer { background:#fff; padding:25px; text-align:center; border-top:1px solid #ddd; color:#555; font-size:14px; }

/* ================= MOBILE RESPONSIVE ================= */
@media (max-width:768px){
  header { flex-direction:column; align-items:flex-start; }
  nav { margin-top:10px; width:100%; justify-content:flex-start; }
  nav a, .dropbtn { margin-left:0; margin-right:15px; margin-top:8px; }
  .grid { grid-template-columns:1fr; padding:20px; }
  .search-bar { max-width:90%; flex-direction:column; gap:10px; }
  .search-bar input, .search-bar button { width:100%; border-radius:8px; }
  .game-table { width:100%; }
}
</style>
</head>
<body>

<header>
  <div class="site-title">ZAG Archive</div>
  <nav>
    <a href="https://zagv2.github.io/ZAGArchive-/index.html">Home</a>

    <div class="dropdown">
      <button class="dropbtn">Sections ▼</button>
      <div class="dropdown-content">
        <a href="https://zagv2.github.io/Homebrew-Games/">Homebrew Games</a>
        <a href="https://zagv2.github.io/romhacks-patches/">ROM Hacks & Patches</a>
      </div>
    </div>

    <a href="https://zagv2.github.io/ZAGArchive-/about.html">About</a>
    <a href="https://zagv2.github.io/ZAGArchive-/contact.html">Contact</a>
  </nav>
</header>

<!-- Search -->
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search by title or console...">
  <button onclick="searchGames()">Search</button>
</div>

<!-- Trending grid -->
<section class="grid" id="trendingGrid">
  <!-- Cards auto-populated by auto.js -->
</section>

<!-- Table -->
<table class="game-table" id="gamesTable">
  <thead>
    <tr><th>Cover</th><th>Name</th><th>Console</th><th>Creator</th><th>Year</th></tr>
  </thead>
  <tbody>
    <!-- Rows auto-populated by auto.js -->
  </tbody>
</table>

<!-- Pagination -->
<div class="pagination" id="pagination"></div>

<footer>
© 2026 ZAG Archive - Homebrew Games
</footer>

<script src="auto.js"></script>
</body>
</html>
